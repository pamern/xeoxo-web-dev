- trigger: Giỏ hàng -> Mở trang giỏ hàng
  screen: Giỏ hàng
  type: STANDARD
  name: Lấy giỏ hàng hiện tại
  description: Lấy giỏ hàng ACTIVE của customer hoặc guest session, kèm toàn bộ item trong giỏ.
  resource: cart
  method: GET
  endpoint: /api/v1/cart
  http_request: GET /api/v1/cart
  authentication: PUBLIC / CUSTOMER
  request:
    path_parameters:
    - Không có
    query_parameters:
    - Không có
    body: null
  response:
    body_fields:
    - code
    - message
    - data.cart_id
    - data.cart_status
    - data.items[].cart_item_id
    - data.items[].variant_id
    - data.items[].product_line_id
    - data.items[].slug
    - data.items[].name
    - data.items[].thumbnail
    - data.items[].color_name
    - data.items[].color_code
    - data.items[].size_name
    - data.items[].quantity
    - data.items[].unit_price
    - data.items[].line_total
    - data.items[].stock_quantity
    - data.items[].is_available
    - data.subtotal
    success_example:
      code: 200
      message: Thành công
      data:
        cart_id: 1
        cart_status: ACTIVE
        items:
        - cart_item_id: 10
          variant_id: 5
          product_line_id: 1
          slug: ao-dai-ha-khue
          name: Áo Dài Hạ Khuê
          thumbnail: https://cdn.xeoxo.vn/products/a.jpg
          color_name: Đỏ
          color_code: '#FF0000'
          size_name: M
          quantity: 2
          unit_price: 1250000
          line_total: 2500000
          stock_quantity: 8
          is_available: true
        subtotal: 2500000
    error_examples:
    - code: 404
      message: Không tìm thấy giỏ hàng
    - code: 500
      message: Lỗi hệ thống
  ui_display:
  - Danh sách sản phẩm trong giỏ
  - Ảnh
  - Tên
  - Màu
  - Size
  - Số lượng
  - Đơn giá
  - Thành tiền từng dòng
  - Tạm tính
  business_rules:
  - 1. Nếu có token CUSTOMER → lấy customer_id.
  - 2. Nếu guest → lấy session_id từ cookie/header.
  - 3. Query CART ACTIVE theo customer_id hoặc session_id.
  - 4. Join CART_ITEM.
  - 5. Join PRODUCT_VARIANT → PRODUCT_COMPONENT → PRODUCT_LINE.
  - 6. Join COLOR, SIZE_OPTION, PRODUCT_LINE_MEDIA, MEDIA.
  - 7. Join INVENTORY để lấy tồn kho.
  - 8. Tính line_total = quantity * unit_price.
  - 9. Tính subtotal.
  - 10. Trả về giỏ hàng.
  dev_notes:
  - DB CART_ITEM hiện chỉ hỗ trợ variant_id, nên giỏ hàng chỉ hỗ trợ sản phẩm STANDARD. Nếu muốn custom vào giỏ cần thêm customization_id
    nullable vào CART_ITEM.
  validation_rules:
  - Nếu không có cart ACTIVE thì có thể trả cart rỗng.
  - quantity không vượt tồn kho.
  - Chỉ hiển thị item có product/variant còn hợp lệ.
  security:
  - Không nhận customer_id từ client; cart theo token hoặc session.
- trigger: Giỏ hàng -> Bấm thêm vào giỏ
  screen: Product detail / Giỏ hàng
  type: CUSTOM
  name: Thêm sản phẩm vào giỏ
  description: Thêm variant vào giỏ. Nếu đã có trong giỏ thì cộng dồn quantity.
  resource: cart-items
  method: POST
  endpoint: /api/v1/cart-items
  http_request: POST /api/v1/cart-items
  authentication: PUBLIC / CUSTOMER
  request:
    path_parameters:
    - Không có
    query_parameters:
    - Không có
    body: 'variant_id (integer, bắt buộc)

      quantity (integer, bắt buộc, mặc định 1 nếu FE không truyền)'
  response:
    body_fields:
    - code
    - message
    - data.cart_id
    - data.cart_item_id
    - data.variant_id
    - data.quantity
    - data.unit_price
    - data.line_total
    success_example:
      code: 200
      message: Đã thêm sản phẩm vào giỏ
      data:
        cart_id: 1
        cart_item_id: 10
        variant_id: 5
        quantity: 2
        unit_price: 1250000
        line_total: 2500000
    error_examples:
    - code: 400
      message: Thiếu thông tin bắt buộc
    - code: 404
      message: Không tìm thấy biến thể sản phẩm
    - code: 409
      message: Số lượng vượt quá tồn kho
    - code: 500
      message: Lỗi hệ thống
  ui_display:
  - Toast thêm vào giỏ
  - Số lượng item mới trong giỏ
  business_rules:
  - 1. Xác định cart ACTIVE theo customer/session.
  - 2. Nếu chưa có cart thì tạo CART mới.
  - 3. Query PRODUCT_VARIANT theo variant_id.
  - 4. Check variant ACTIVE và tồn kho INVENTORY.
  - 5. Nếu (cart_id, variant_id) đã tồn tại → cộng dồn quantity.
  - 6. Nếu chưa có → insert CART_ITEM.
  - 7. Lưu unit_price tại thời điểm thêm vào giỏ.
  - 8. Trả về dòng giỏ hàng.
  dev_notes:
  - Dựa vào UNIQUE (cart_id, variant_id) để upsert. Không cho FE truyền unit_price; BE lấy từ PRODUCT_VARIANT.price.
  validation_rules:
  - variant_id bắt buộc, tồn tại, ACTIVE.
  - quantity là số nguyên dương.
  - Tổng quantity sau upsert không vượt tồn kho.
  security:
  - Không tin giá từ FE; validate tồn kho phía BE.
- trigger: Giỏ hàng -> Đổi màu/size/số lượng
  screen: Giỏ hàng
  type: CUSTOM
  name: Cập nhật dòng giỏ hàng
  description: Cập nhật variant hoặc quantity của một dòng giỏ hàng. Dùng chung cho đổi màu, đổi size, đổi số lượng.
  resource: cart-items
  method: PATCH
  endpoint: /api/v1/cart-items/{cart_item_id}
  http_request: PATCH /api/v1/cart-items/{cart_item_id}
  authentication: PUBLIC / CUSTOMER
  request:
    path_parameters:
    - cart_item_id (integer, bắt buộc)
    query_parameters:
    - Không có
    body: 'variant_id (integer, optional)

      quantity (integer, optional)'
  response:
    body_fields:
    - code
    - message
    - data.cart_item_id
    - data.variant_id
    - data.quantity
    - data.unit_price
    - data.line_total
    - data.stock_quantity
    - data.is_available
    success_example:
      code: 200
      message: Cập nhật giỏ hàng thành công
      data:
        cart_item_id: 10
        variant_id: 6
        quantity: 1
        unit_price: 1250000
        line_total: 1250000
        stock_quantity: 5
        is_available: true
    error_examples:
    - code: 403
      message: Không có quyền thao tác trên dòng giỏ hàng này
    - code: 404
      message: Không tìm thấy dòng giỏ hàng
    - code: 409
      message: Số lượng vượt quá tồn kho
    - code: 500
      message: Lỗi hệ thống
  ui_display:
  - Dòng giỏ hàng sau cập nhật
  - Giá mới nếu đổi variant
  - Trạng thái còn hàng
  business_rules:
  - 1. Query CART_ITEM theo cart_item_id.
  - 2. Check cart item thuộc cart hiện tại của customer/session.
  - 3. Nếu đổi variant_id → query variant mới.
  - 4. Check variant mới ACTIVE, cùng product line nếu rule UI chỉ cho đổi màu/size trong cùng sản phẩm.
  - 5. Check tồn kho.
  - 6. Update variant_id, quantity, unit_price nếu variant đổi.
  - 7. Nếu variant mới đã tồn tại trong cart → merge quantity và xóa dòng cũ.
  - 8. Trả item mới nhất.
  dev_notes:
  - Một API dùng chung cho đổi màu, size, số lượng vì cùng resource cart-items.
  validation_rules:
  - cart_item_id là số nguyên dương.
  - Ít nhất một trong variant_id, quantity phải được truyền.
  - quantity > 0.
  - Không vượt tồn kho.
  - Item phải thuộc cart hiện tại.
  security:
  - Check ownership cart item; không cho sửa cart người khác.
