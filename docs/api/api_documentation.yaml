  ui_display:
  - Ảnh/video sản phẩm
  - Tên sản phẩm
  - Giá
  - Màu sắc
  - Size
  - Mô tả sản phẩm
  - Chất liệu, hướng dẫn bảo quản
  - Rating trung bình
  - Số lượng review
  - 3 review đầu tiên
  - Nút “Xem thêm” nếu has_more = true
  business_rules:
  - '1. Đọc path param: slug.'
  - 2. Validate dữ liệu đầu vào.
  - 3. Query PRODUCT_LINE theo slug.
  - 4. Nếu không tồn tại hoặc PRODUCT_LINE.status != ACTIVE → trả 404.
  - 5. Lấy media từ PRODUCT_LINE_MEDIA và MEDIA.
  - 6. Lấy màu chính từ COLOR theo PRODUCT_LINE.color_id.
  - 7. Lấy material từ MATERIAL theo PRODUCT_LINE.material_id.
  - 8. Lấy components từ PRODUCT_COMPONENT.
  - 9. Lấy variant từ PRODUCT_VARIANT theo component_id.
  - 10. Lấy size từ SIZE_OPTION theo PRODUCT_VARIANT.size_option_id.
  - 11. Lấy tồn kho từ INVENTORY theo variant_id để xác định is_available.
  - 12. Query REVIEW có review_status = DISPLAY để tính reviews_summary.avg_rating và reviews_summary.total.
  - 13. Lấy 3 review mới nhất làm reviews_preview.
  - 14. Lấy media review từ REVIEW_MEDIA và MEDIA nếu có.
  - 15. Tính reviews_summary.preview_count và reviews_summary.has_more.
  - 16. Trả về object chi tiết sản phẩm.
  dev_notes:
  - DB cần có slug trong PRODUCT_LINE nếu endpoint dùng /product-lines/{slug}.
  - Không trả customer_id, email, phone vì UI không dùng và không nên expose dữ liệu khách hàng.
  - variant_id cần trả vì FE dùng để thêm sản phẩm vào giỏ hàng.
  - is_available dùng để enable/disable size và nút thêm giỏ.
  - Nếu sản phẩm chưa có review thì trả avg_rating = 0, total = 0, preview_count = 0, has_more = false, reviews_preview =
    [].
  - Nút “Xem thêm” không dùng endpoint riêng; FE gọi API review list với page/limit tăng dần, ví dụ /api/v1/product-lines/{slug}/reviews?page=2&limit=3.
  validation_rules:
  - slug bắt buộc.
  - slug không được rỗng sau khi trim.
  - slug phải đúng định dạng URL slug.
  - 'Backend logic: đã chặn số lượng tối đa = tồn kho, user kh thể bấm hơn tồn kho, mặc định = 1, sản phẩm hết hàng sẽ tự
    kh hiển thị'
  security:
  - Chỉ đọc; validate path param; sanitize input; dùng prepared statement/ORM để tránh SQL injection; không trả dữ liệu nội
    bộ như customer_id, email, phone, internal_note, cost_price.
- trigger: Product list + Filter -> product list
  screen: null
  type: CUSTOM
  name: Danh sách sản phẩm có filter
  description: User đang ở trang danh sách sản phẩm và dùng bộ lọc để lọc lại product list theo department, category, collection,
    size, màu sắc, giá, chất liệu, usage context.
  resource: product-lines
  method: GET
  endpoint: /api/v1/product-lines
  http_request: GET /api/v1/product-lines?department={department}&category_id={category_id}&collection_id={collection_id}&color_id={color_id}&size_option_id={size_option_id}&material_id={material_id}&usage_context={usage_context}&price_lte={price_lte}&sort_price={sort_price}&page={page}&limit={limit}
  authentication: PUBLIC
  request:
    path_parameters:
    - Không có
    query_parameters:
    - 'department optional: WOMEN, MEN, KIDS'
    - category_id optional
    - collection_id optional
    - color_id optional
    - size_option_id optional
    - material_id optional
    - usage_context optional
    - price_lte optional
    - 'sort_price optional: asc, desc'
    - page, limit
    body: Không có vì dùng GET.
  response:
    body_fields:
    - code
    - message
    - data[].product_line_id
    - data[].slug
    - data[].name
    - data[].thumbnail
    - data[].price
    - data[].currency
    - pagination.page
    - pagination.limit
    - pagination.total
    - filter_meta.max_price_available
    success_example:
      code: 200
      message: Thành công
      data:
      - product_line_id: 90
        slug: ao-dai-nu-party
        name: Áo Dài Nữ Party
        thumbnail: https://cdn.xeoxo.vn/products/a.jpg
        price: 950000
        currency: VND
      pagination:
        page: 1
        limit: 20
        total: 48
      filter_meta:
        max_price_available: 2500000
    error_examples:
    - code: 404
      message: Không tìm thấy sản phẩm
    - code: 500
      message: Lỗi hệ thống
  ui_display:
  - danh sách sản phẩm
  - thumbnail
  - name
  - price + currency
  - filter (Cố định)
  business_rules:
  - 1. Đọc query params.
  - 2. Validate dữ liệu đầu vào.
  - 3. Query PRODUCT_LINE theo scope hiện tại.
  - 4. Nếu có department/category_id, join CATEGORY, LINE_CATEGORY.
  - 5. Nếu có collection_id, filter PRODUCT_LINE.collection_id.
  - 6. Nếu có color_id, filter PRODUCT_LINE.color_id.
  - 7. Nếu có material_id, filter PRODUCT_LINE.material_id.
  - 8. Nếu có usage_context, filter PRODUCT_LINE.usage_context.
  - 9. Nếu có size_option_id, join PRODUCT_COMPONENT, PRODUCT_VARIANT để filter variant size.
  - 10. Filter ACTIVE.
  - 11. Lấy thumbnail, price.
  - 12. Tính filter_meta.max_price_available theo scope.
  - 13. Apply price_lte.
  - 14. Apply sort_price nếu có.
  - 15. Apply pagination.
  dev_notes:
  - Product list mặc định đã sort theo newest, nên không cần truyền sort=newest.
  - Thanh giá không cần cột riêng trong DB.
  - filter_meta.max_price_available là derived state do BE tính từ PRODUCT_VARIANT.price, không phải cột DB.
  - price_lte là giá user chọn trên thanh giá; backend dùng để lọc sản phẩm có price <= price_lte.
  - Nếu FE chưa kéo thanh giá thì không truyền price_lte.
  - sort_price chỉ xử lý giá thấp đến cao hoặc cao đến thấp.
  validation_rules:
  - 'Ít nhất một scope chính nên được truyền: department, category_id hoặc collection_id.'
  - 'department nếu truyền chỉ nhận: Nữ, Nam, Trẻ Em.'
  - category_id nếu truyền phải là số nguyên dương và tồn tại trong CATEGORY.
  - collection_id nếu truyền phải là số nguyên dương và tồn tại trong COLLECTION.
  - price_lte nếu truyền phải >= 0.
  - 'sort_price nếu truyền chỉ nhận: asc, desc.'
  - page phải là số nguyên dương, mặc định = 1 nếu không truyền.
  - limit phải là số nguyên dương, mặc định = 20 nếu không truyền.
  - limit không được vượt quá 50.
  security:
  - Chỉ đọc; validate query param; sanitize input; dùng prepared statement/ORM để tránh SQL injection; không trả dữ liệu nội
    bộ không dùng trên UI
