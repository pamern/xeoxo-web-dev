  ui_display:
  - danh sách  collection
  - thumbnail
  - launch date
  - cultural story
  - description
  business_rules:
  - '1. Đọc query params: page, limit.'
  - 2. Validate dữ liệu đầu vào.
  - 3. Query COLLECTION.
  - 4. Filter COLLECTION.status được phép hiển thị public.
  - 5. Lấy thumbnail từ MEDIA theo COLLECTION.media_id.
  - '6. Map dữ liệu response: collection_name thành name, content_json.cultural_story thành cultural_story.'
  - 7. Sort theo COLLECTION.launch_date DESC Newest.
  - 8. Apply pagination.
  - 9. Trả về danh sách bộ sưu tập, không kèm product.
  dev_notes:
  - Check page & limit
  - Check status (chỉ dùng cho status public có phải là tất cả bộ sưu tập từ trước đến giờ không) -> trên UI là status ẩn
    nha
  validation_rules:
  - page phải là số nguyên dương, mặc định = 1 nếu không truyền.
  - limit phải là số nguyên dương, mặc định = 20 nếu không truyền.
  - limit không được vượt quá 50
  - hiển thị bộ sưu tập theo timeline newest
  security:
  - Chỉ đọc, không có rủi ro ghi dữ liệu. Validate query param tránh SQL injection qua filter.
- trigger: Collection -> collection detail
  screen: null
  type: CUSTOM
  name: Chi tiết bộ sưu tập
  description: Xem câu chuyện/concept của 1 bộ sưu tập, gộp luôn danh sách sản phẩm thuộc bộ sưu tập đó.
  resource: collections
  method: GET
  endpoint: /api/v1/collections/{collection_id}
  http_request: GET /api/v1/collections/{collection_id}
  authentication: PUBLIC
  request:
    path_parameters:
    - collection_id bắt buộc
    query_parameters:
    - Không có
    body: null
  response:
    body_fields:
    - code (integer) — Mã HTTP status, khớp status code thật của response
    - message (string) — Thông báo tiếng Việt, hiển thị trực tiếp được cho user
    - data (object) — Payload chính của response
    - data.collection (object) — Thông tin bộ sưu tập
    - data.collecct.slug
    - data.collection.name (string) — Tên hiển thị
    - data.collection.description (string) — Mô tả bộ sưu tập
    - data.collection.thumbnail (string) — URL ảnh đại diện bộ sưu tập
    - data.collection.cultural_story (string) — Câu chuyện văn hóa/concept của bộ sưu tập
    - data.collection.launch_date (string) — Ngày ra mắt (YYYY-MM-DD)
    - data.products (array<object>) — Danh sách sản phẩm thuộc bộ sưu tập
    - data.products[].product_line_id (string) — Mã dòng sản phẩm
    - data.products[].name (string) — Tên hiển thị
    - data.products[].thumbnail (string) — URL ảnh đại diện sản phẩm
    - data.products[].price (numeric) — Giá hiển thị
    - data.products[].currency (string) — Đơn vị tiền tệ
    success_example:
      code: 200
      message: Thành công
      data:
        collection:
          collection_id: 1
          slug: ha-khue
          name: Hạ Khuê
          description: BST lấy cảm hứng từ mùa hè Việt Nam.
          thumbnail: https://cdn.xeoxo.vn/collections/ha-khue.jpg
          cultural_story: Câu chuyện giao thoa giữa truyền thống và hiện đại.
          launch_date: '2026-04-01'
        products:
        - product_line_id: 10
          slug: ao-dai-ha-khue
          name: Áo Dài Hạ Khuê
          thumbnail: https://cdn.xeoxo.vn/products/a.jpg
          price: 1350000
          currency: VND
