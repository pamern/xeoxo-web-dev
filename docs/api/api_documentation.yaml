      address_id optional nếu member chọn địa chỉ lưu

      shipping_address object optional nếu guest hoặc nhập mới

      voucher_code optional

      use_free_shipping_reward_id optional'
  response:
    body_fields:
    - code
    - message
    - data.subtotal
    - data.shipping_fee
    - data.reward_discount_amount
    - data.total_amount
    - data.applied_reward.reward_id
    - data.applied_reward.reward_type
    - data.applied_reward.reward_value
    - data.items[].cart_item_id
    - data.items[].line_total
    success_example:
      code: 200
      message: Thành công
      data:
        subtotal: 2500000
        shipping_fee: 30000
        reward_discount_amount: 100000
        total_amount: 2430000
        applied_reward:
          reward_id: 5
          reward_type: TIER_VOUCHER
          reward_value: 100000
        items:
        - cart_item_id: 10
          line_total: 2500000
    error_examples:
    - code: 400
      message: Thiếu thông tin bắt buộc
    - code: 404
      message: Không tìm thấy địa chỉ hoặc voucher
    - code: 409
      message: Voucher không khả dụng
    - code: 409
      message: Một số sản phẩm không còn đủ tồn kho
    - code: 500
      message: Lỗi hệ thống
  ui_display:
  - Tạm tính
  - Phí ship
  - Voucher/quyền lợi được áp dụng
  - Thành tiền cuối
  business_rules:
  - 1. Xác định cart hiện tại theo customer/session.
  - 2. Validate cart_item_ids thuộc cart hiện tại.
  - 3. Query CART_ITEM, PRODUCT_VARIANT, INVENTORY.
  - 4. Tính subtotal từ giá hiện tại hoặc unit_price theo rule đã chốt.
  - '5. Xác định địa chỉ: member dùng address_id, guest dùng shipping_address.'
  - 6. Join PROVINCE để tính phí ship.
  - 7. Nếu có voucher_code, query LOYALTY_REWARD AVAILABLE.
  - 8. Nếu có free shipping reward, check reward AVAILABLE.
  - 9. Tính reward_discount_amount, shipping_fee, total_amount.
  - 10. Trả preview.
  dev_notes:
  - Đây chỉ là preview, không insert order/payment. Khi tạo order vẫn phải validate lại từ đầu, không tin preview cũ.
  validation_rules:
  - cart_item_ids không rỗng.
  - Tất cả item thuộc cart hiện tại.
  - Nếu member dùng address_id, address phải thuộc customer.
  - Nếu guest, shipping_address phải đủ recipient/province/district/detail.
  - Voucher nếu truyền phải AVAILABLE, chưa hết hạn, thuộc customer nếu là reward cá nhân.
  security:
  - Không tính tiền ở FE; BE là nguồn sự thật về giá/voucher/ship.
