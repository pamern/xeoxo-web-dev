        thumbnail: https://cdn.xeoxo.vn/collections/ha-khue.jpg
        cultural_story: Câu chuyện về sự giao thoa giữa văn hóa truyền thống và hiện đại.
        launch_date: '2026-04-01'
      pagination:
        page: 1
        limit: 20
        total: 24
    error_examples:
    - code: 404
      message: Không tìm thấy bộ sưu tập nào
    - code: 500
