  screen: tương tự cái dưới
  type: CUSTOM
  name: Tạo hồ sơ số đo (may đo cá nhân)
  description: User nhập số đo và bấm Lưu Biểu mẫu. Hệ thống tạo CUSTOMIZATION_REQUEST với measurement snapshot; nếu member chọn lưu mặc định thì cập nhật thêm MEASUREMENT_PROFILE.
  resource: customization-requests
  method: POST
  endpoint: /api/v1/customization-requests
  http_request: POST /api/v1/customization-requests
  authentication: PUBLIC (Guest hoặc Customer)
  request:
    path_parameters:
    - Không có
    query_parameters:
    - Không có
    body: 'component_id (integer, bắt buộc)

      customer_note optional

      measurements.height

      measurements.weight

      measurements.chest

      measurements.waist

      measurements.hip

      measurements.shoulder

      measurements.neck

      measurements.arm_length

      measurements.bicep'
  response:
    body_fields:
    - code
    - message
    - data.customization_id
    - data.component_id
    - data.unit_price
    - data.surcharge_percent
    - data.surcharge_amount
    - data.custom_price
    - data.customization_status
    - data.measurement_snapshot
    - data.created_at
    success_example:
      code: 201
      message: Tạo yêu cầu may đo thành công
      data:
        customization_id: 101
        component_id: 15
        customization_status: REQUESTED
        measurement_snapshot:
          component_id: 15
          component_type: AO
          measurements:
            height: 165
            weight: 52
            chest: 84
            waist: 68
            hip: 90
            shoulder: 38
            neck: 34
            arm_length: 55
            bicep: 26
          note: May om vua
          source: CUSTOMIZE_MODAL
          saved_as_default: true
          created_at: '2026-07-03T10:00:00Z'
        created_at: '2026-07-03T10:00:00Z'
    error_examples:
    - code: 400
      message: Thiếu thông tin bắt buộc
    - code: 404
      message: Không tìm thấy sản phẩm
    - code: 422
      message: Số đo không hợp lệ
    - code: 500
      message: Lỗi hệ thống
  ui_display:
  - Toast tạo yêu cầu thành công
  - Số đo vừa nhập
  - Giá custom nếu UI cần
  - customization_id dùng cho bước sau
  business_rules:
  - 1. Đọc request body.
  - 2. Validate dữ liệu đầu vào.
  - 3. Nếu có token → lấy customer_id; nếu guest → customer_id = NULL.
  - 4. Query PRODUCT_COMPONENT theo component_id và load variant active để xác định giá nền.
  - 5. Nếu không tồn tại hoặc inactive → 404.
  - 6. Tạo measurement_snapshot JSON từ measurements + note + metadata tại thời điểm submit.
  - 7. Tính unit_price từ giá sản phẩm.
  - 8. Tính surcharge_percent — nếu chưa có rule thì default 0.
  - 9. Tính surcharge_amount = unit_price * surcharge_percent / 100.
  - 10. Tính custom_price = unit_price + surcharge_amount.
  - 11. Insert CUSTOMIZATION_REQUEST với customer_id, component_id, measurement_snapshot, unit_price, surcharge_percent,
    surcharge_amount, custom_price, customization_status = REQUESTED, customer_note.
  - 12. Nếu member chọn save_as_default = true thì upsert MEASUREMENT_PROFILE như side effect độc lập.
  - 13. Trả về request vừa tạo; dữ liệu giao dịch đọc từ measurement_snapshot, không đọc ngược từ profile.
  dev_notes:
  - 4 field unit_price, surcharge_percent, surcharge_amount, custom_price trong DB là NOT NULL nên không được ghi “nếu có”.
    Phải luôn tính, có thể default phụ phí = 0.
  validation_rules:
  - component_id bắt buộc, tồn tại và ACTIVE.
  - measurements bắt buộc.
  - Tất cả số đo là số > 0.
  - 'Range hợp lý: height 100–220, weight 20–200, vòng đo 20–200.'
  - customer_note không vượt quá giới hạn ký tự.
  security:
  - PUBLIC — rate limit theo IP (chống spam tạo hồ sơ ảo). Không cho set customer_id qua body, luôn lấy từ token nếu có. Validate
    kiểu số tránh injection.
