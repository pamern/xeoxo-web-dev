    - page (integer, mặc định = 1)
    - limit (integer, mặc định = 20)
    body: null
  response:
    body_fields:
    - code (integer) — Mã HTTP status, khớp status code thật của response
    - message (string) — Thông báo tiếng Việt, hiển thị trực tiếp được cho user
    - data (array<object>) — Payload chính của response
    - data[].collection_id (string) — Mã bộ sưu tập
    - data[].slug (string) — Định danh dùng cho URL
    - data[].name (string) — Tên hiển thị
    - data[].description (string) — Mô tả bộ sưu tập
    - data[].thumbnail (string) — URL ảnh đại diện bộ sưu tập
    - data[].cultural_story (string) — Câu chuyện văn hóa/concept của bộ sưu tập
    - data[].launch_date (string) — Ngày ra mắt (YYYY-MM-DD)
    - data[].status (string) — Trạng thái hiện tại
