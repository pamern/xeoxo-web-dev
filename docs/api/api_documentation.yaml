      message: Không tìm thấy bộ sưu tập {slug}
    - code: 500
      message: Lỗi hệ thống
  ui_display:
  - collection.name
  - collection. description
  - thumbnail
  - cultural story
  - launch date
  - products (array)
  - product line id + name + thumbnail + price + currency
  business_rules:
  - '1. Đọc path param: slug.'
  - 2. Validate dữ liệu đầu vào.
  - 3. Query COLLECTION theo slug.
  - 4. Nếu không tồn tại hoặc status không public → trả 404.
