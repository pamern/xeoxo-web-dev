    - data.rows[].values[].measurement_type_id (integer) — Mã loại thông số đo, dùng để map với columns
    - data.rows[].values[].value (string) — Giá trị hiển thị trên bảng size, ví dụ 94, 165 - 168, 55 - 60
    success_example:
      code: 200
      message: Thành công
      data:
        chart_name: Size Chart Áo Dài
        description: Thông số chỉ mang tính tham khảo.
        columns:
        - measurement_type_id: 1
          measurement_name: Dài áo
          unit: cm
        - measurement_type_id: 2
          measurement_name: Chiều cao
          unit: cm
        - measurement_type_id: 3
          measurement_name: Cân nặng
          unit: kg
        - measurement_type_id: 4
          measurement_name: Ngực
          unit: cm
        - measurement_type_id: 5
          measurement_name: Eo
          unit: cm
        - measurement_type_id: 6
          measurement_name: Vai
          unit: cm
        rows:
        - size_option_id: 1
          size_name: S
          values:
          - measurement_type_id: 1
            value: '94'
          - measurement_type_id: 2
            value: 165 - 168
          - measurement_type_id: 3
            value: 55 - 60
          - measurement_type_id: 4
            value: 86 - 88
          - measurement_type_id: 5
            value: 70 - 72
          - measurement_type_id: 6
            value: 43 - 44
        - size_option_id: 2
          size_name: M
          values:
          - measurement_type_id: 1
            value: '98'
          - measurement_type_id: 2
            value: 169 - 170
          - measurement_type_id: 3
            value: 61 - 65
          - measurement_type_id: 4
            value: 90 - 92
          - measurement_type_id: 5
            value: 74 - 76
          - measurement_type_id: 6
            value: '45'
    error_examples:
    - code: 404
      message: Không tìm thấy sản phẩm
    - code: 404
      message: Không tìm thấy bảng kích thước
    - code: 500
      message: Lỗi hệ thống
  ui_display:
  - Tên bảng size chart
  - Header cột thông số đo
  - Dòng size XS/S/M/L/XL
  - Giá trị đo theo từng size
  - Ghi chú bảng size nếu có
  business_rules:
  - '1. Đọc path param: slug.'
  - 2. Validate dữ liệu đầu vào.
  - 3. Query PRODUCT_LINE theo slug.
  - 4. Nếu không tồn tại hoặc PRODUCT_LINE.status != ACTIVE → trả 404.
  - 5. Ưu tiên query SIZE_CHART theo PRODUCT_LINE.product_line_id nếu sản phẩm có bảng size riêng.
  - 6. Nếu không có size chart riêng, lấy category chính từ LINE_CATEGORY.
  - 7. Query SIZE_CHART_CATEGORY để tìm SIZE_CHART áp dụng cho category đó.
  - 8. Filter SIZE_CHART.is_active = true.
  - 9. Query SIZE_OPTION theo size_chart_id.
  - 10. Query SIZE_MEASUREMENT theo size_option_id.
  - 11. Query MEASUREMENT_TYPE theo measurement_type_id.
  - 12. Transform dữ liệu thành columns từ MEASUREMENT_TYPE.
  - 13. Transform dữ liệu thành rows từ SIZE_OPTION và SIZE_MEASUREMENT.
  - 14. Convert measurement_value hoặc measurement_min/measurement_max thành value dạng string để FE render trực tiếp.
  - 15. Trả về dữ liệu size chart để FE render tabl
  dev_notes:
  - API chỉ gọi khi user bấm mở popup “Bảng kích thước”, không cần load chung trong product detail nếu muốn tối ưu payload.
  - Response thiết kế theo dạng table DTO gồm columns và rows, không trả raw DB.
  - value là field FE hiển thị trực tiếp, được BE transform từ measurement_value, measurement_min, measurement_max.
  - Nếu có measurement_value thì hiển thị một giá trị, ví dụ 94.
  - Nếu có measurement_min và measurement_max thì hiển thị dạng khoảng, ví dụ 165 - 168.
  - Nếu một sản phẩm thuộc nhiều category, ưu tiên category chính LINE_CATEGORY.is_primary = true.
  - Nếu DB chưa có PRODUCT_LINE.slug thì đổi endpoint sang /api/v1/product-lines/{product_line_id}/size-chart hoặc thêm cột
    slug vào DB.
  - DB hiện có SIZE_MEASUREMENT.measurement_order để sort thứ tự cột/thông số đo; nếu muốn sort size XS/S/M/L/XL ổn định thì
    nên quy ước theo SIZE_OPTION.size_name hoặc bổ sung display_order cho SIZE_OPTION.
  validation_rules:
  - slug bắt buộc.
  - slug không được rỗng sau khi trim.
  - slug phải đúng định dạng URL slug.
  security:
  - Chỉ đọc; validate path param; sanitize input; dùng prepared statement/ORM để tránh SQL injection; không trả dữ liệu nội
    bộ không dùng trên UI.
