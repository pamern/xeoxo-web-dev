      data:
      - method_id: 1
        method_name: Thanh toán thẻ nội địa OnePay
        method_code: ONEPAY_DOMESTIC
      - method_id: 2
        method_name: Thanh toán thẻ quốc tế OnePay
        method_code: ONEPAY_INTERNATIONAL
    error_examples:
    - code: 500
      message: Lỗi hệ thống
  ui_display:
  - Danh sách phương thức thanh toán
  - OnePay nội địa/quốc tế hoặc method đang active
  business_rules:
  - 1. Query PAYMENT_METHOD.
  - 2. Filter is_active = true.
  - 3. Trả danh sách method.
  dev_notes:
  - DB enum hiện có COD, MOMO, VNPAY, CARD, BANK_TRANSFER. Nếu UI muốn OnePay nội địa/quốc tế thì cần thêm method_code phù
    hợp vào master data.
  validation_rules:
  - Chỉ trả method active.
  security:
  - Chỉ đọc.
- trigger: Thanh toán -> Bấm Thanh toán ngay
  screen: Thanh toán
  type: CUSTOM
  name: Tạo đơn hàng
  description: Tạo order từ các cart item được chọn. Insert order, order item, shipping, payment, reward usage.
  resource: orders
  method: POST
  endpoint: /api/v1/orders
  http_request: POST /api/v1/orders
  authentication: PUBLIC / CUSTOMER
  request:
    path_parameters:
    - Không có
    query_parameters:
    - Không có
    body: 'cart_item_ids bắt buộc

      address_id optional nếu member chọn địa chỉ

      shipping_address object optional nếu guest/nhập mới

      method_id bắt buộc

      voucher_code optional

      use_free_shipping_reward_id optional

      customer_note optional'
  response:
    body_fields:
    - code
    - message
    - data.order_id
    - data.order_code
    - data.order_status
    - data.payment_status
    - data.shipping_id
    - data.payment_id
    - data.total_amount
    - data.payment_url optional
    success_example:
      code: 201
      message: Tạo đơn hàng thành công
      data:
        order_id: 1001
        order_code: XX202607050001
        order_status: PENDING
        payment_status: PENDING
        shipping_id: 501
        payment_id: 701
        total_amount: 2430000
        payment_url: https://payment-gateway.example/pay/abc
    error_examples:
    - code: 400
      message: Thiếu thông tin bắt buộc
    - code: 409
      message: Một số sản phẩm không còn đủ tồn kho
    - code: 409
      message: Voucher không còn khả dụng
    - code: 422
      message: Địa chỉ giao hàng không hợp lệ
    - code: 500
      message: Lỗi hệ thống
  ui_display:
  - Mã đơn hàng
  - Tổng tiền
  - Link thanh toán nếu online
  - Thông báo đặt hàng thành công/chờ thanh toán
  business_rules:
  - '1. Xác định customer: nếu token → customer_id; nếu guest → tạo/tìm CUSTOMER GUEST theo email/phone trong shipping_address.'
  - 2. Xác định cart theo customer/session.
  - 3. Validate cart_item_ids thuộc cart.
  - 4. Re-query giá, tồn kho, voucher, shipping fee.
  - 5. Tính subtotal, shipping_fee, reward_discount_amount, total_amount.
  - 6. Nếu guest hoặc địa chỉ mới → tạo ADDRESS cho customer guest/member nếu cần.
  - 7. Insert SALES_ORDER với order_status PENDING, payment_status PENDING.
  - 8. Insert ORDER_ITEM từ cart items.
  - 9. Insert SHIPPING theo address_id.
  - 10. Insert PAYMENT với method_id, amount, payment_status PENDING, transaction_code tạm.
  - 11. Nếu dùng reward → update LOYALTY_REWARD.status = USED, insert REWARD_USAGE.
  - 12. Trừ/giữ tồn kho theo rule.
  - 13. Delete các CART_ITEM đã checkout hoặc update cart status CHECKOUT nếu checkout toàn bộ.
  - 14. Trả order info.
  dev_notes:
  - Bắt buộc validate lại, không dùng số tiền từ checkout-preview. SALES_ORDER.reward_dicount_amount trong DB đang typo, API
    response nên dùng reward_discount_amount.
  validation_rules:
  - cart_item_ids không rỗng.
  - method_id tồn tại và active.
  - Item thuộc cart hiện tại.
  - Tồn kho đủ.
  - Address hợp lệ.
  - Voucher/reward AVAILABLE.
  - Email/phone bắt buộc với guest vì CUSTOMER email/phone NOT NULL.
  security:
  - Dùng transaction toàn bộ order/shipping/payment/reward/cart. Không tin dữ liệu giá từ FE.
- trigger: Thanh toán -> Tạo/khởi tạo thanh toán
  screen: Thanh toán / Payment redirect
  type: CUSTOM
  name: Tạo thanh toán cho đơn hàng
  description: Tạo hoặc lấy link thanh toán cho order đã tạo, dùng khi cần tách bước payment khỏi create order.
  resource: payments
  method: POST
  endpoint: /api/v1/orders/{order_id}/payments
  http_request: POST /api/v1/orders/{order_id}/payments
  authentication: PUBLIC / CUSTOMER
  request:
    path_parameters:
    - order_id bắt buộc
    query_parameters:
    - Không có
    body: method_id bắt buộc
  response:
    body_fields:
    - code
    - message
    - data.payment_id
    - data.order_id
    - data.amount
    - data.payment_status
    - data.transaction_code
    - data.payment_url optional
    success_example:
      code: 200
      message: Tạo thanh toán thành công
      data:
        payment_id: 701
        order_id: 1001
        amount: 2430000
        payment_status: PENDING
        transaction_code: TXN1001
        payment_url: https://payment-gateway.example/pay/abc
    error_examples:
    - code: 403
      message: Không có quyền thanh toán đơn hàng này
    - code: 404
      message: Không tìm thấy đơn hàng
    - code: 409
      message: Đơn hàng đã được thanh toán
    - code: 500
      message: Lỗi hệ thống
  ui_display:
  - Link chuyển sang cổng thanh toán
  - Trạng thái thanh toán PENDING
  business_rules:
  - 1. Query SALES_ORDER theo order_id.
  - 2. Check order thuộc customer/session hiện tại.
  - 3. Check payment_status = PENDING.
  - 4. Query PAYMENT_METHOD active.
  - 5. Tạo hoặc update PAYMENT PENDING.
  - 6. Gọi payment gateway nếu có.
  - 7. Trả payment_url hoặc payment info.
  dev_notes:
  - Nếu POST /orders đã tạo payment luôn thì API này chỉ cần khi user retry thanh toán hoặc payment flow tách riêng.
  validation_rules:
  - order_id là số nguyên dương.
  - Method active.
  - Order chưa PAID/CANCELLED.
  security:
  - Check ownership order; không cho thanh toán đơn của người khác.

