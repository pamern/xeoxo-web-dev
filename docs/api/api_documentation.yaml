title: XEOXO Web API Documentation
version: v1
base_path: /api/v1
conventions:
  success_response: '{ code, message, data }'
  paginated_response: '{ code, message, data, pagination }'
  message_language: vi
  code_rule: Body code phải khớp HTTP status thật.
  security_rule: API có dữ liệu cá nhân phải lấy customer_id từ token/session hoặc xác thực bằng contact.
sheet_coverage:
  source_data_rows: 30
  rows_with_endpoint_and_method: 25
  rows_without_endpoint_or_method: 5
  documented_endpoints: 25
  documented_not_separate_endpoints: 3
  status_only_rows: 2
endpoints:
- trigger: Menu, catalog -> Product list
  screen: null
  type: STANDARD
  name: Danh sách sản phẩm theo department
  description: "Lấy danh sách dòng sản phẩm theo giới tính/độ tuổi (Nữ/Nam/Trẻ Em)\n- Bấm ở menu \n- Bấm ở xem đầy đủ ở catalog\
    \ thuộc department"
  resource: product-lines
  method: GET
  endpoint: /api/v1/product-lines
  http_request: GET /api/v1/product-lines?department={department}&page={page}&limit={limit}
  authentication: PUBLIC
  request:
    path_parameters:
    - Không có
    query_parameters:
    - 'department (string, bắt buộc): Nữ, Nam, Trẻ Em'
    - page (integer, mặc định = 1)
    - limit (integer, mặc định = 20)
    body: null
  response:
    body_fields:
    - code (integer) — Mã HTTP status, khớp status code thật của response
    - message (string) — Thông báo tiếng Việt, hiển thị trực tiếp được cho user
    - data (array<object>) — Payload chính của response
    - data[].product_line_id (string) — Mã dòng sản phẩm
    - data[].slug (string) — Định danh dùng cho URL
    - data[].name (string) — Tên hiển thị
    - data[].thumbnail (string) — URL ảnh đại diện
    - data[].price (numeric) — Giá bán (VND)
    - data[].currency (string) — Đơn vị tiền tệ
    - pagination (object) — Thông tin phân trang
    - pagination.page (integer) — Trang hiện tại (bắt đầu từ 1)
    - pagination.limit (integer) — Số item mỗi trang
    - pagination.total (integer) — Tổng số item (không phải số trang)
    success_example:
      code: 200
      message: Thành công
      data:
      - product_line_id: PL001
        slug: ao-so-mi-nam
        name: Áo sơ mi nam
        thumbnail: https://cdn.xeoxo.vn/products/ao-so-minam.jpg
        price: 750000
        currency: VND
      pagination:
        page: 1
        limit: 20
        total: 120
    error_examples:
    - code: 404
      message: Không tìm thấy sản phẩm cho department 'Nam'
    - code: 500
      message: Lỗi hệ thống
  ui_display:
  - danh sách sp
  - thumbnail
  - name
  - price + currency
  - filter (Cố định)
  business_rules:
  - '1. Đọc query params: department, page, limit.'
  - 2. Validate dữ liệu đầu vào.
  - 3. Query CATEGORY theo department.
  - 4. Lấy các product_line_id thuộc department từ LINE_CATEGORY.
  - 5. Query PRODUCT_LINE theo danh sách product_line_id.
  - 6. Filter CATEGORY.is_active = true và PRODUCT_LINE.status = ACTIVE.
  - 7. Lấy thumbnail từ PRODUCT_LINE_MEDIA và MEDIA.
  - 8. Lấy price từ PRODUCT_VARIANT thông qua PRODUCT_COMPONENT.
  - 9. Sort theo PRODUCT_LINE.created_at DESC Newest.
  - 10. Apply pagination.
  - 11. Trả về danh sách sản phẩm.
  dev_notes:
  - Cần sort theo giá thấp nhất ko, hiện tại là sản phẩm update mới nhất sẽ hiện lên
  - check limit & page
  validation_rules:
  - department bắt buộc.
  - 'department chỉ nhận: Nữ, Nam, Trẻ Em.'
  - page phải là số nguyên dương, mặc định = 1 nếu không truyền.
  - limit phải là số nguyên dương, mặc định = 20 nếu không truyền.
  - limit không được vượt quá 50.
  - hiển thị sản phẩm theo newest
  security:
  - Chỉ đọc, không có rủi ro ghi dữ liệu. Validate query param tránh SQL injection qua filter.
