  - 4. Chỉ cho hủy PENDING/CONFIRMED.
  - 5. Update status CANCELLED.
  dev_notes:
  - Vì appointment có customer_id nullable, flow tạo lịch phải luôn gắn CUSTOMER guest/member để hủy/lookup được. Nếu không,
    guest không xác thực được lịch.
  validation_rules:
  - id là số nguyên dương.
  - Guest bắt buộc truyền contact.
  - Chỉ hủy PENDING/CONFIRMED
