endpoints:
  - trigger: Acccount -> Lịch sử mua hàng
    screen: null
    type: STANDARD
    name: Danh sách đơn hàng đã mua
    description: Member xem danh sách đơn hàng theo 5 tab Tất cả, Vận chuyển, Hoàn thành, Đã hủy, Đã hoàn trả.
    resource: orders
    method: GET
    endpoint: /api/v1/orders
    http_request: GET /api/v1/orders?status_group={status_group}&page={page}&limit={limit}
    authentication: CUSTOMER
    request:
      path_parameters:
        - Không có
      query_parameters:
        - "status_group (optional): all, shipping, completed, cancelled, returned"
        - page
        - limit
      body: null
    response:
      body_fields:
        - code
        - message
        - data[].order_id
        - data[].order_code
        - data[].order_date
        - data[].order_status
        - data[].payment_status
        - data[].reward_discount_amount
        - data[].shipping_fee
        - data[].total_amount
        - data[].tracking_code
        - data[].shipping_provider
        - data[].shipping_status
        - data[].refund_status
        - data[].items[].order_item_id
        - data[].items[].item_type
        - data[].items[].thumbnail
        - data[].items[].product_name
        - data[].items[].color
        - data[].items[].size
        - data[].items[].quantity
        - data[].items[].unit_price
        - data[].items[].line_total
        - data[].items[].has_review
        - pagination
      success_example:
        code: 200
        message: Thành công
        data:
          - order_id: 1
            order_code: XX20260630
            order_date: "2026-06-30T08:00:00Z"
            order_status: COMPLETED
            payment_status: PAID
            reward_discount_amount: 0
            shipping_fee: 30000
            total_amount: 2450000
            tracking_code: GHN123456789
            shipping_provider: GHN
            shipping_status: DELIVERED
            refund_status: null
            items:
              - order_item_id: 11
                item_type: STANDARD
                thumbnail: https://cdn.xeoxo.vn/products/a.jpg
                product_name: Áo Dài
                color: Đỏ
                size: M
                quantity: 1
                unit_price: 2450000
                line_total: 2450000
                has_review: false
        pagination:
          page: 1
          limit: 10
          total: 5
      error_examples:
        - code: 401
          message: Chưa đăng nhập hoặc token không hợp lệ
        - code: 500
          message: Lỗi hệ thống
    ui_display:
      - 5 tab trạng thái
      - Mã đơn
      - Badge trạng thái
      - Ảnh, tên, màu, size, số lượng sản phẩm
      - Tổng tiền
      - Nút Mua lại / Liên hệ đổi trả / Đánh giá / Theo dõi đơn / Xem thông tin hoàn tiền
    business_rules:
      - Lấy customer_id từ token.
      - Query sales.sales_order theo customer_id.
      - Join sales.order_item.
      - Với item STANDARD: join catalog.product_variant -> catalog.product_component -> catalog.product_line.
      - Với item CUSTOMIZED: join customization_request -> product_line.
      - Join product_line_media và media để lấy thumbnail.
      - Left join sales.shipping để lấy tracking_code, shipping_provider, shipping_status.
      - Left join sales.refund hoặc dữ liệu đổi trả liên quan để lấy refund_status khi có.
      - Left join sales.review theo order_item_id để xác định has_review.
      - Map status_group theo trạng thái hiển thị thay vì chỉ dựa vào sales_order.order_status.
      - Apply pagination.
    dev_notes:
      - Schema DB hiện dùng reward_dicount_amount; backend nên map thống nhất thành reward_discount_amount khi trả API.
      - status_group shipping/returned phải xét thêm shipping_status và refund/return status.
    validation_rules:
      - status_group chỉ nhận all, shipping, completed, cancelled, returned.
      - page, limit là số nguyên dương.
      - limit không vượt quá 50.
    security:
      - Không nhận customer_id từ query; luôn lấy từ token.
      - Chỉ trả đơn hàng của customer hiện tại.

  - trigger: Acccount -> Lịch sử mua hàng
    screen: null
    type: CUSTOM
    name: Tạo yêu cầu đổi trả
    description: Member hoặc guest gửi yêu cầu trả hàng cho đơn COMPLETED trong thời hạn cho phép.
    resource: return-requests
    method: POST
    endpoint: /api/v1/orders/{order_id}/return-requests
    http_request: POST /api/v1/orders/{order_id}/return-requests
    authentication: PUBLIC
    request:
      path_parameters:
        - order_id (integer, bắt buộc)
      query_parameters:
        - Không có
      body: |
        contact bắt buộc nếu guest
        return_reason bắt buộc
        items[].order_item_id bắt buộc
        items[].return_quantity bắt buộc
    response:
      body_fields:
        - code
        - message
        - data.return_id
        - data.order_id
        - data.return_status
        - data.requested_at
        - data.items[].return_item_id
        - data.items[].order_item_id
        - data.items[].return_quantity
        - data.items[].return_amount
      success_example:
        code: 201
        message: Đã gửi yêu cầu đổi trả
        data:
          return_id: 301
          order_id: 1001
          return_status: REQUESTED
          requested_at: "2026-07-03T10:00:00Z"
          items:
            - return_item_id: 1
              order_item_id: 11
              return_quantity: 1
              return_amount: 0
      error_examples:
        - code: 400
          message: Thiếu thông tin bắt buộc
        - code: 403
          message: Không có quyền thao tác trên đơn hàng này
        - code: 404
          message: Không tìm thấy đơn hàng
        - code: 409
          message: Đơn hàng đã quá thời hạn đổi trả
        - code: 409
          message: Sản phẩm không đủ điều kiện đổi trả
        - code: 500
          message: Lỗi hệ thống
    ui_display:
      - Toast gửi yêu cầu đổi trả thành công
      - Mã yêu cầu đổi trả
      - Trạng thái REQUESTED
    business_rules:
      - Đọc order_id và body.
      - Query sales.sales_order theo order_id.
      - Nếu token CUSTOMER thì check order thuộc customer hiện tại.
      - Nếu guest thì bắt buộc contact, join customer qua sales_order.customer_id và check contact khớp phone/email.
      - Check order COMPLETED.
      - Check còn hạn 78 giờ theo rule.
      - Validate từng order_item_id thuộc đúng order.
      - Check từng item đủ điều kiện trả hàng.
      - Insert return_request với return_status = REQUESTED.
      - Insert return_item cho từng item.
    dev_notes:
      - Với schema hiện tại, endpoint này mới mô tả yêu cầu trả hàng. Nếu cần hỗ trợ đổi size hoặc đổi mẫu thì phải bổ sung request_type, desired_size_option_id, desired_product_line_id vào RETURN_ITEM hoặc model liên quan.
      - Guest order phải luôn có sales_order.customer_id trỏ tới customer để phục vụ ownership/contact check.
    validation_rules:
      - Guest bắt buộc truyền contact.
      - return_reason bắt buộc.
      - items không rỗng.
      - return_quantity <= số lượng đã mua.
      - Đơn COMPLETED và còn hạn 78 giờ.
      - Item thuộc đúng order.
    security:
      - Check ownership/contact.
      - Rate limit theo IP/contact.

  - trigger: Acccount -> Lịch sử mua hàng
    screen: null
    type: CUSTOM
    name: Đánh giá đơn hàng
    description: Member hoặc guest đánh giá sản phẩm đã mua theo từng order item. Guest phải xác thực contact và insert review bằng customer_id của đơn.
    resource: reviews
    method: POST
    endpoint: /api/v1/order-items/{order_item_id}/reviews
    http_request: POST /api/v1/order-items/{order_item_id}/reviews
    authentication: PUBLIC
    request:
      path_parameters:
        - order_item_id bắt buộc
      query_parameters:
        - Không có
      body: |
        rating bắt buộc
        review_content optional
        media_ids optional
        contact optional nếu guest
    response:
      body_fields:
        - code
        - message
        - data.review_id
        - data.rating
        - data.review_status
        - data.created_at
      success_example:
        code: 201
        message: Gửi đánh giá thành công
        data:
          review_id: 99
          rating: 5
          review_status: DISPLAY
          created_at: "2026-07-03T10:00:00Z"
      error_examples:
        - code: 403
          message: Không có quyền đánh giá sản phẩm này
        - code: 404
          message: Không tìm thấy dòng đơn hàng
        - code: 409
          message: Sản phẩm này đã được đánh giá
    ui_display:
      - Toast gửi đánh giá thành công
    business_rules:
      - Query sales.order_item theo order_item_id.
      - Join sales.sales_order từ order item.
      - Nếu token CUSTOMER thì check order thuộc customer hiện tại và lấy customer_id từ token/order.
      - Nếu guest thì contact bắt buộc; join customer qua sales_order.customer_id; check contact khớp; sau đó lấy chính sales_order.customer_id để insert review.
      - Check order COMPLETED.
      - Check chưa có review cho order_item_id.
      - Insert review.customer_id, order_item_id, rating, review_content, review_status.
      - Nếu có media thì insert review_media.
    dev_notes:
      - review.customer_id là NOT NULL, nên guest review vẫn phải lấy được customer_id từ order.
      - Không dùng product_line_id làm path chính vì review trong schema gắn trực tiếp với order_item_id.
    validation_rules:
      - order_item_id tồn tại.
      - order_item_id thuộc đơn đã COMPLETED.
      - Guest bắt buộc truyền contact.
      - Contact phải khớp customer của đơn.
      - rating từ 1 đến 5.
      - Mỗi order_item_id chỉ review 1 lần.
    security:
      - Không cho review nếu không chứng minh đã mua.
      - Tránh fake review bằng ownership/contact check và rate limit theo IP/contact.
